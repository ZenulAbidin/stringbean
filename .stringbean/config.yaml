agents:
  claude-fable-5:
    adapter: claude
    command:
    - claude
    - --model
    - claude-fable-5
    environment_overrides: {}
    fallback_agent: null
    mode: medium
    model: claude-fable-5
    name: claude-fable-5
    permissions: read_only
    prompt_transport: stdin
    role: advisor
    timeout_seconds: 1200
    working_directory: .
  claude-opus-4-8:
    adapter: claude
    command:
    - claude
    - --model
    - claude-opus-4-8
    environment_overrides: {}
    fallback_agent: null
    mode: high
    model: claude-opus-4-8
    name: claude-opus-4-8
    permissions: read_only
    prompt_transport: stdin
    role: reviewer
    timeout_seconds: 1200
    working_directory: .
  claude-sonnet-5:
    adapter: claude
    command:
    - claude
    - --model
    - claude-sonnet-5
    environment_overrides: {}
    fallback_agent: null
    mode: low
    model: claude-sonnet-5
    name: claude-sonnet-5
    permissions: read_only
    prompt_transport: stdin
    role: reviewer
    timeout_seconds: 1200
    working_directory: .
  gpt55-high:
    adapter: codex
    command:
    - codex
    - exec
    - -m
    - gpt-5.5
    - -c
    - model_reasoning_effort="high"
    environment_overrides: {}
    fallback_agent: null
    mode: high
    model: gpt-5.5
    name: gpt55-high
    permissions: read_write
    prompt_transport: stdin
    role: implementer
    timeout_seconds: 1200
    working_directory: .
  gpt55-low:
    adapter: codex
    command:
    - codex
    - exec
    - -m
    - gpt-5.5
    - -c
    - model_reasoning_effort="low"
    environment_overrides: {}
    fallback_agent: null
    mode: low
    model: gpt-5.5
    name: gpt55-low
    permissions: read_only
    prompt_transport: stdin
    role: advisor
    timeout_seconds: 1200
    working_directory: .
  gpt55-low-rw:
    adapter: codex
    command:
    - codex
    - exec
    - -m
    - gpt-5.5
    - -c
    - model_reasoning_effort="low"
    environment_overrides: {}
    fallback_agent: null
    mode: low
    model: gpt-5.5
    name: gpt55-low-rw
    permissions: read_write
    prompt_transport: stdin
    role: implementer
    timeout_seconds: 1200
    working_directory: .
  gpt55-medium:
    adapter: codex
    command:
    - codex
    - exec
    - -m
    - gpt-5.5
    - -c
    - model_reasoning_effort="medium"
    environment_overrides: {}
    fallback_agent: null
    mode: medium
    model: gpt-5.5
    name: gpt55-medium
    permissions: read_only
    prompt_transport: stdin
    role: advisor
    timeout_seconds: 1200
    working_directory: .
  gpt55-medium-rw:
    adapter: codex
    command:
    - codex
    - exec
    - -m
    - gpt-5.5
    - -c
    - model_reasoning_effort="medium"
    environment_overrides: {}
    fallback_agent: null
    mode: medium
    model: gpt-5.5
    name: gpt55-medium-rw
    permissions: read_write
    prompt_transport: stdin
    role: implementer
    timeout_seconds: 1200
    working_directory: .
  gpt56-high:
    adapter: codex
    command:
    - codex
    - exec
    - -m
    - gpt-5.6
    - -c
    - model_reasoning_effort="high"
    environment_overrides: {}
    fallback_agent: null
    mode: high
    model: gpt-5.6
    name: gpt56-high
    permissions: read_write
    prompt_transport: stdin
    role: orchestrator
    timeout_seconds: 1200
    working_directory: .
  gpt56-low:
    adapter: codex
    command:
    - codex
    - exec
    - -m
    - gpt-5.6
    - -c
    - model_reasoning_effort="low"
    environment_overrides: {}
    fallback_agent: null
    mode: low
    model: gpt-5.6
    name: gpt56-low
    permissions: read_only
    prompt_transport: stdin
    role: reviewer
    timeout_seconds: 1200
    working_directory: .
  gpt56-medium:
    adapter: codex
    command:
    - codex
    - exec
    - -m
    - gpt-5.6
    - -c
    - model_reasoning_effort="medium"
    environment_overrides: {}
    fallback_agent: null
    mode: medium
    model: gpt-5.6
    name: gpt56-medium
    permissions: read_only
    prompt_transport: stdin
    role: advisor
    timeout_seconds: 1200
    working_directory: .
  grok-build:
    adapter: grok
    command:
    - grok
    - --model
    - grok-build
    - --reasoning-effort
    - high
    environment_overrides: {}
    fallback_agent: null
    mode: high
    model: grok-build
    name: grok-build
    permissions: read_write
    prompt_transport: argv
    role: implementer
    timeout_seconds: 1200
    working_directory: .
  grok-review:
    adapter: grok
    command:
    - grok
    - --model
    - grok-build
    - --reasoning-effort
    - low
    environment_overrides: {}
    fallback_agent: null
    mode: low
    model: grok-build
    name: grok-review
    permissions: read_only
    prompt_transport: argv
    role: reviewer
    timeout_seconds: 1200
    working_directory: .
output:
  redact_environment_values: true
  retain_raw_output: true
  stream_agent_output: true
repository:
  create_checkpoint_commits: false
  require_clean_start: false
  require_git: true
version: 1
workflow:
  advisor_policy: before_implementation
  advisors:
  - gpt55-low
  - gpt55-medium
  - claude-fable-5
  - gpt56-medium
  - claude-opus-4-8
  implementers:
  - gpt55-low-rw
  - gpt55-medium-rw
  - gpt55-high
  - grok-build
  max_review_rounds: 2
  max_total_agent_calls: 24
  orchestrator: gpt55-high
  parallel_read_only_agents: false
  parallel_write_agents: false
  researcher: []
  reviewers:
  - gpt55-low
  - claude-opus-4-8
  - claude-sonnet-5
  - grok-review
  - gpt56-low
  testers: []
