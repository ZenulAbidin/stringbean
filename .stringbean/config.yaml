    mode: medium
    model: fable
    name: claude-fable
    permissions: read_only
    prompt_transport: stdin
    role: advisor
    timeout_seconds: 0
    idle_timeout_seconds: 7200
    max_repeated_output_lines: 200
    working_directory: .
