output:
  redact_environment_values: true
  retain_raw_output: true
  stream_agent_output: true
repository:
  create_checkpoint_commits: false
  exclude_nested_repositories: true
  excluded_paths: []
  require_clean_start: false
  require_git: false
version: 1
workflow:
  advisor_policy: before_implementation
  advisors:
  - gpt55-low
  - gpt55-medium
  - claude-sonnet
  - claude-fable
  - gpt56-medium
  - gpt56-terra-medium
  - gpt56-luna-medium
  - claude-opus
  implementers:
  - gpt55-low-rw
  - gpt55-medium-rw
  - gpt55-high
  - grok-build
  max_review_rounds: 2
  max_total_agent_calls: 24
  orchestrator: gpt55-high
  parallel_read_only_agents: false
  parallel_write_agents: false
  researcher: []
  reviewers:
  - gpt55-low
  - claude-opus
  - claude-haiku
  - grok-review
  - gpt56-low
  - gpt56-terra-low
  - gpt56-luna-low
  testers: []
